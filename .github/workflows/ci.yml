name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  RunMake:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make

      - name: Build program
        run: |
          make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-program
          path: text_processor

  RunTest:
    needs: RunMake
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download built program
        uses: actions/download-artifact@v4
        with:
          name: built-program
          path: .

      - name: Run functional test
        run: |
          chmod +x text_processor
          echo "Small big largest." | ./text_processor > result.txt
          grep -q "Small" result.txt && grep -q "largest" result.txt && echo "Test Passed"

  RunPackage:
    needs: RunTest
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: built-program
          path: .

      - name: Build .deb package
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/DEBIAN
          cp text_processor package/usr/bin/
          cp control package/DEBIAN/
          dpkg-deb --build package text-processor-v17.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: text-processor-v17.deb
          retention-days: 1

  test-docker:
    needs: RunPackage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: cmertick/lab3:latest  

      - name: Save Docker image to dist folder
        run: |
          mkdir -p dist
          docker save cmertick/lab3:latest -o dist/myapp-container.tar 
          gzip -f dist/myapp-container.tar

      - name: Upload container artifact to dist
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: dist/myapp-container.tar.gz
          retention-days: 1